<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spatial AI Workbench</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #overlay > * { pointer-events: auto; }
    #hud {
      position: absolute;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: #00d4ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      opacity: 0.7;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      pointer-events: none;
      display: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(0, 212, 255, 0.6);
    }
    #crosshair::before {
      width: 2px; height: 100%;
      left: 50%; transform: translateX(-50%);
    }
    #crosshair::after {
      width: 100%; height: 2px;
      top: 50%; transform: translateY(-50%);
    }
    .html-input-overlay {
      position: absolute;
      z-index: 20;
      pointer-events: auto;
    }
    .html-input-overlay textarea,
    .html-input-overlay input {
      background: rgba(10, 10, 26, 0.9);
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      padding: 8px;
      border-radius: 4px;
      outline: none;
      resize: none;
    }
    .html-input-overlay textarea:focus,
    .html-input-overlay input:focus {
      border-color: rgba(0, 212, 255, 0.7);
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="overlay">
      <div id="hud">Click to enter workspace — WASD to move, Mouse to look</div>
      <div id="crosshair"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
